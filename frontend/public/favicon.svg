<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E243D" />
      <stop offset="100%" stop-color="#07182C" />
    </linearGradient>
    <linearGradient id="front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FD1C5" />
      <stop offset="100%" stop-color="#2A9D8F" />
    </linearGradient>
    <linearGradient id="back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Clean squircle background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />

  <g filter="url(#shadow)">
    <!-- Back Left Person (Team Member) -->
    <circle cx="150" cy="190" r="44" fill="url(#back)" />
    <path d="M 60 360 C 60 290 100 260 150 260 C 200 260 240 290 240 360 Z" fill="url(#back)" />

    <!-- Back Right Person (Team Member) -->
    <circle cx="362" cy="190" r="44" fill="url(#back)" />
    <path d="M 272 360 C 272 290 312 260 362 260 C 412 260 452 290 452 360 Z" fill="url(#back)" />

    <!-- Front Center Person (Employee/Manager) -->
    <circle cx="256" cy="210" r="64" fill="url(#front)" />
    <path d="M 120 420 C 120 330 180 290 256 290 C 332 290 392 330 392 420 Z" fill="url(#front)" />
  </g>
</svg>