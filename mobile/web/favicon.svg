<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#060913" />
    </linearGradient>

    <!-- Teal-Blue Gradient for Cognition (Left Wing) -->
    <linearGradient id="teal-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#0F52BA" />
    </linearGradient>

    <!-- Violet-Teal Gradient for HR / People (Right Wing) -->
    <linearGradient id="violet-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#00A88F" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow for Depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- App Icon Squircle Base Plate -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg-grad)" filter="url(#shadow)" />
  <rect x="24" y="24" width="464" height="464" rx="112" fill="none" stroke="rgba(0, 242, 254, 0.15)" stroke-width="2.5" />

  <!-- Main Styled Icon Graphic -->
  <g transform="translate(0, 0)">
    <!-- Left Wing: Representing Cogni / Technology (Stylized 'C' curve) -->
    <path d="M 230,120 
             A 120,120 0 0,0 230,392 
             C 170,392 140,340 140,256 
             C 140,172 170,120 230,120 Z" 
          fill="url(#teal-blue)" 
          opacity="0.95" 
          filter="url(#shadow)" />

    <!-- Right Wing: Representing HR / Human Connection -->
    <path d="M 282,120 
             A 120,120 0 0,1 282,392 
             C 342,392 372,340 372,256 
             C 372,172 342,120 282,120 Z" 
          fill="url(#violet-teal)" 
          opacity="0.9" 
          filter="url(#shadow)" />

    <!-- Overlapping Central Human Figure / Connection Core -->
    <!-- Shoulders / Torso -->
    <path d="M 216,330 
             C 216,290 232,270 256,270 
             C 280,270 296,290 296,330 
             C 296,345 288,355 276,355 
             L 236,355 
             C 224,355 216,345 216,330 Z" 
          fill="#ffffff" 
          filter="url(#glow)" />
    
    <!-- Glowing Head/Intelligence Node -->
    <circle cx="256" cy="225" r="28" fill="#ffffff" filter="url(#glow)" />
    <!-- Core Synapse Dot -->
    <circle cx="256" cy="225" r="10" fill="#00f2fe" />

    <!-- Interconnected Network Nodes representing AI Integration -->
    <!-- Node 1 (Top-Left) -->
    <circle cx="190" cy="150" r="10" fill="#00f2fe" filter="url(#glow)" />
    <line x1="190" y1="150" x2="256" y2="225" stroke="#00f2fe" stroke-width="3" stroke-dasharray="2,4" opacity="0.8" />

    <!-- Node 2 (Top-Right) -->
    <circle cx="322" cy="150" r="10" fill="#8b5cf6" filter="url(#glow)" />
    <line x1="322" y1="150" x2="256" y2="225" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="2,4" opacity="0.8" />

    <!-- Node 3 (Far Left) -->
    <circle cx="120" cy="256" r="8" fill="#00f2fe" filter="url(#glow)" />
    <line x1="120" y1="256" x2="190" y2="150" stroke="#00f2fe" stroke-width="2" opacity="0.6" />

    <!-- Node 4 (Far Right) -->
    <circle cx="392" cy="256" r="8" fill="#00A88F" filter="url(#glow)" />
    <line x1="392" y1="256" x2="322" y2="150" stroke="#00A88F" stroke-width="2" opacity="0.6" />
    
    <!-- Node 5 (Bottom) -->
    <circle cx="256" cy="405" r="12" fill="#00f2fe" filter="url(#glow)" />
    <line x1="256" y1="355" x2="256" y2="405" stroke="#00f2fe" stroke-width="3" stroke-dasharray="2,4" opacity="0.8" />
  </g>
</svg>
